<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tark Sangam Website Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5efe2;
        font-family: Georgia, serif;
        color: #10233d;
      }

      .preview-bar {
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 18px;
        background: #fffdf6;
        border-bottom: 1px solid rgba(16, 35, 61, 0.14);
      }

      .preview-bar strong {
        color: #0c4f78;
      }

      .preview-bar a {
        color: #0c4f78;
        font-weight: 700;
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 54px);
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="preview-bar">
      <strong>Tark Sangam Website Preview</strong>
      <a href="index.html" target="_blank" rel="noopener">Open full website</a>
    </div>
    <iframe src="index.html" title="Tark Sangam website"></iframe>
  </body>
</html>
